<script>
// ── curtain ───────────────────────────────────────────────────────────────
const curtain = document.getElementById('curtain');
function transitionTo(fromId, toId, callback) {
  curtain.classList.add('fade-in');
  setTimeout(() => {
    document.getElementById(fromId).classList.add('hidden');
    const toEl = document.getElementById(toId);
    toEl.classList.remove('hidden');
    toEl.querySelectorAll('*').forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
    curtain.classList.remove('fade-in');
    if (callback) callback();
  }, 700);
}

// ── audio ─────────────────────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq=520, dur=0.07, vol=0.15) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type='sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+dur);
}

// ── captcha ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('captchaCanvas');
const ctx = canvas.getContext('2d');
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b))}
function pick(arr){return arr[randInt(0,arr.length)]}

function drawCaptcha() {
  const W=700,H=240; canvas.width=W; canvas.height=H;
  canvas.style.width='min(700px,92vw)'; canvas.style.height='auto';
  ctx.clearRect(0,0,W,H);
  const cf=["Garamond,'EB Garamond',serif"];
  const sf=["Georgia,serif","Palatino,'Palatino Linotype',serif","Baskerville,'Baskerville Old Face',serif","'Times New Roman',Times,serif"];
  function ink(){return `hsl(${randInt(200,270)},${randInt(5,30)}%,${randInt(10,45)}%)`}
  const layout=[{text:"are you",y:H*0.44,bs:rand(54,66)},{text:"human?",y:H*0.88,bs:rand(66,82)}];
  layout.forEach(({text,y,bs:baseSize})=>{
    ctx.font=`bold ${baseSize}px Georgia,serif`;
    let tw=ctx.measureText(text).width*rand(0.95,1.08), cx=(W-tw)/2;
    for(const ch of text){
      const sz=baseSize+rand(-12,13),ang=rand(-0.32,0.32),dy=rand(-13,13),skX=rand(-0.08,0.08);
      const cf2=Math.random()<0.35?pick(cf):pick(sf),wt=Math.random()>0.25?'bold':'400',it=Math.random()<0.3?'italic':'';
      ctx.save(); ctx.font=`${it} ${wt} ${sz}px ${cf2}`;
      const cw=ctx.measureText(ch).width;
      ctx.translate(cx+cw/2,y+dy); ctx.rotate(ang); ctx.transform(1,0,skX,1,0,0);
      ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.fillStyle=ink();
      ctx.fillText(ch,-cw/2,0); ctx.restore(); cx+=cw+rand(-3,7);
    }
  });
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(rand(0,W*0.3),rand(0,H));ctx.bezierCurveTo(rand(W*0.1,W*0.5),rand(0,H),rand(W*0.5,W*0.9),rand(0,H),rand(W*0.7,W),rand(0,H));ctx.strokeStyle=`hsla(220,15%,30%,${rand(0.06,0.13)})`;ctx.lineWidth=rand(0.6,1.4);ctx.stroke();}
  for(let i=0;i<40;i++){ctx.beginPath();ctx.arc(rand(0,W),rand(0,H),rand(0.3,1.2),0,Math.PI*2);ctx.fillStyle=`hsla(220,10%,20%,${rand(0.04,0.12)})`;ctx.fill();}
}
drawCaptcha();

// ── page flow ─────────────────────────────────────────────────────────────
document.getElementById('page1').addEventListener('click', () => {
  ensureAudio();
  transitionTo('page1','page2', () => {
    // stare for 3s then timer
    setTimeout(() => {
      transitionTo('page2','page3', () => { startTimer(); });
    }, 3000);
  });
});

// ── timer ─────────────────────────────────────────────────────────────────
function startTimer() {
  const display = document.getElementById('timerDisplay');
  const img = document.getElementById('timer-image');
  display.style.opacity='1'; display.style.animation='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>img.classList.add('visible')));
  let count=30; display.textContent=count;
  const iv=setInterval(()=>{
    count--; display.textContent=count;
    display.classList.remove('pulse'); void display.offsetWidth; display.classList.add('pulse');
    beep(480+(count/30)*120,0.08,0.15);
    if(count<=0){clearInterval(iv);setTimeout(()=>startBlink(display),200);}
  },1000);
}

function startBlink(display) {
  display.textContent='blink'; display.style.animation='none'; display.style.opacity='1';
  let blinks=0;
  const iv=setInterval(()=>{
    blinks++; document.body.style.opacity=blinks%2===1?'0':'1';
    if(blinks>=12){
      clearInterval(iv); document.body.style.opacity='1';
      // page4: "what color do you see?" for 3 seconds then page5
      setTimeout(()=>transitionTo('page3','page4',()=>{
        setTimeout(()=>transitionTo('page4','page5', buildColorUI), 3000);
      }),600);
    }
  },200);
}

// ── color interaction ─────────────────────────────────────────────────────
const COLORS = [
  {id:'pink',   label:'pink',   bg:'#f4a7b9', dot:'#c4607a'},
  {id:'white',  label:'white',  bg:'#e0e0e0', dot:'#999'},
  {id:'yellow', label:'yellow', bg:'#f9e48a', dot:'#b8940a'},
  {id:'blue',   label:'blue',   bg:'#a8c8f0', dot:'#2a5aaa'},
  {id:'green',  label:'green',  bg:'#a8ddb5', dot:'#2a7a40'},
  {id:'orange', label:'orange', bg:'#f5b97e', dot:'#c05010'},
];

function buildColorUI() {
  const sectionsRow = document.getElementById('sections-row');
  const circlesRow  = document.getElementById('circles-row');
  sectionsRow.innerHTML=''; circlesRow.innerHTML='';

  const CIRCLE_SIZE = 40;
  const sectionEls = {};
  // track which circles are in each section
  const sectionCircles = {}; // colorId -> count

  COLORS.forEach(c => {
    sectionCircles[c.id] = 0;
    const sec = document.createElement('div');
    sec.dataset.color = c.id;
    sec.style.cssText = `
      width: clamp(74px,11.5vw,106px);
      min-height: clamp(110px,19vh,155px);
      border-radius: 999px;
      background: ${c.bg};
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 8px 12px;
      gap: 6px;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    `;
    const lbl = document.createElement('span');
    lbl.style.cssText = `font-size:clamp(0.48rem,1vw,0.65rem);font-weight:200;letter-spacing:0.2em;text-transform:uppercase;color:${c.dot};flex-shrink:0;`;
    lbl.textContent = c.label;
    sec.appendChild(lbl);
    sectionsRow.appendChild(sec);
    sectionEls[c.id] = sec;
  });

  // create 6 circles in the staging area
  const circleData = [];
  for(let i=0;i<6;i++) {
    const c = document.createElement('div');
    c.style.cssText = `
      width:${CIRCLE_SIZE}px;height:${CIRCLE_SIZE}px;border-radius:50%;
      background:rgba(40,35,55,0.07);border:1.5px solid rgba(40,35,55,0.14);
      cursor:grab;touch-action:none;flex-shrink:0;
      transition:background 0.2s,border-color 0.2s;
    `;
    circleData.push({el:c, colorId:null, placed:false});
    circlesRow.appendChild(c);
  }

  let dragging = null, ghost = null;

  function getHoveredSection(x, y) {
    let best = null;
    Object.values(sectionEls).forEach(sec => {
      const r = sec.getBoundingClientRect();
      if (x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) best = sec;
    });
    return best;
  }

  function checkAllPlaced() {
    if (circleData.every(d => d.placed)) {
      const allWhite = circleData.every(d => d.colorId === 'white');
      document.getElementById('result-text').textContent = allWhite ? 'yes, you are human.' : 'no, you are not human.';
      setTimeout(() => transitionTo('page5','page-result'), 800);
    }
  }

  circleData.forEach((cd, idx) => {
    const c = cd.el;

    c.addEventListener('pointerdown', e => {
      e.preventDefault();
      // if already placed, pick it back out of the section
      if (cd.placed && cd.colorId) {
        const sec = sectionEls[cd.colorId];
        // move circle back to staging visually (just detach from section)
        c.style.background = 'rgba(40,35,55,0.07)';
        c.style.borderColor = 'rgba(40,35,55,0.14)';
        circlesRow.appendChild(c);
        sectionCircles[cd.colorId]--;
        cd.colorId = null;
        cd.placed = false;
      }
      dragging = idx;
      c.setPointerCapture(e.pointerId);
      c.style.cursor = 'grabbing';
      c.style.opacity = '0.3';

      ghost = document.createElement('div');
      ghost.style.cssText = `
        width:${CIRCLE_SIZE}px;height:${CIRCLE_SIZE}px;border-radius:50%;
        background:rgba(40,35,55,0.2);border:1.5px solid rgba(40,35,55,0.4);
        position:fixed;pointer-events:none;z-index:9999;transform:scale(1.2);
      `;
      document.body.appendChild(ghost);
      ghost.style.left = (e.clientX - CIRCLE_SIZE/2) + 'px';
      ghost.style.top  = (e.clientY - CIRCLE_SIZE/2) + 'px';
      Object.values(sectionEls).forEach(s => s.style.transform = 'scale(1)');
    });

    c.addEventListener('pointermove', e => {
      if (dragging !== idx || !ghost) return;
      ghost.style.left = (e.clientX - CIRCLE_SIZE/2) + 'px';
      ghost.style.top  = (e.clientY - CIRCLE_SIZE/2) + 'px';
      const hov = getHoveredSection(e.clientX, e.clientY);
      Object.values(sectionEls).forEach(s => s.style.transform='scale(1)');
      if (hov) hov.style.transform = 'scale(1.05)';
    });

    c.addEventListener('pointerup', e => {
      if (dragging !== idx || !ghost) return;
      const hov = getHoveredSection(e.clientX, e.clientY);
      c.style.opacity = '1';
      if (hov) {
        const col = COLORS.find(x => x.id === hov.dataset.color);
        cd.colorId = col.id;
        cd.placed = true;
        sectionCircles[col.id]++;

        // style the circle to match the section
        c.style.background = col.dot + '55';
        c.style.borderColor = col.dot + '99';
        c.style.cursor = 'grab';

        // physically move circle into the section (above the label)
        const lbl = hov.querySelector('span');
        hov.insertBefore(c, lbl);

        checkAllPlaced();
      } else {
        // return to staging
        cd.colorId = null; cd.placed = false;
        c.style.background = 'rgba(40,35,55,0.07)';
        c.style.borderColor = 'rgba(40,35,55,0.14)';
        c.style.cursor = 'grab';
        circlesRow.appendChild(c);
      }
      Object.values(sectionEls).forEach(s => s.style.transform = 'scale(1)');
      ghost.remove(); ghost = null; dragging = null;
    });
  });
}
