<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>are you human</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;background:white;cursor:crosshair;transition:opacity 0.08s ease;font-family:'Helvetica Neue',Helvetica,sans-serif}
.page{display:flex;align-items:center;justify-content:center;width:100%;height:100%;position:absolute;inset:0;background:white}
.page.hidden{display:none}

/* captcha */
.hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);font-weight:200;font-size:0.65rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(40,35,55,0.3);opacity:0;animation:fadeIn 1.5s ease 1.8s forwards;pointer-events:none;white-space:nowrap}

/* stare */
.stare-text{font-weight:100;font-size:clamp(3.5rem,10vw,8rem);letter-spacing:0.18em;color:rgba(40,35,55,0.82);opacity:0;animation:fadeIn 1.4s ease 0.2s forwards;text-align:center;}

/* timer */
#page3{flex-direction:column;gap:32px}
#timer-image{width:min(640px,88vw);aspect-ratio:1200/800;/* bg set by JS */background-size:cover;background-position:center;border-radius:2px;opacity:0;transition:opacity 10s linear}
#timer-image.visible{opacity:1}
.timer-number{font-weight:100;font-size:clamp(1.2rem,3vw,2rem);letter-spacing:0.12em;color:rgba(40,35,55,0.55);opacity:0;animation:fadeIn 1.4s ease 0.2s forwards;line-height:1}
.timer-number.pulse{animation:pulse 0.18s ease-out forwards}

/* what color */
.color-q-text{font-weight:100;font-size:clamp(1.4rem,4vw,3rem);letter-spacing:0.14em;color:rgba(40,35,55,0.78);opacity:0;animation:fadeIn 1.6s ease 0.3s forwards;text-align:center;padding:2rem}

/* result */
.result-text{font-family:Georgia,serif;font-weight:bold;font-size:clamp(1.8rem,5vw,4rem);letter-spacing:0.02em;color:rgba(40,35,55,0.82);opacity:0;text-align:center;padding:2rem;font-style:italic;}

/* curtain */
#curtain{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:100;transition:opacity 0.7s ease}
#curtain.fade-in{opacity:1;pointer-events:all}

@keyframes fadeIn{to{opacity:1}}
@keyframes pulse{0%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div id="curtain"></div>

<!-- Sound hint -->
<div id="sound-hint" style="position:fixed;bottom:20px;left:22px;z-index:200;display:flex;align-items:center;gap:7px;opacity:0;animation:fadeIn 2s ease 3s forwards;pointer-events:none;transition:opacity 0.5s ease;">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(40,35,55,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
  </svg>
  <span style="font-family:inherit;font-weight:300;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(40,35,55,0.45);">turn sound on for the best experience</span>
</div>

<!-- Page 1: captcha -->
<div id="page1" class="page" style="align-items:center;justify-content:center;">
  <canvas id="captchaCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0;animation:fadeIn 1.2s ease 0.3s forwards;"></canvas>
  <button id="start-btn" style="position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-family:inherit;font-weight:300;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(40,35,55,0.6);background:none;border:none;border-bottom:1.5px solid rgba(40,35,55,0.3);padding:9px 24px;cursor:pointer;opacity:0;animation:fadeIn 1.5s ease 1.8s forwards;transition:color 0.2s,border-color 0.2s;z-index:2;white-space:nowrap;">start</button>
</div>

<!-- Page 2: stare -->
<div id="page2" class="page hidden">
  <p class="stare-text">stare at the middle of the photo.</p>
</div>

<!-- Page 3: timer -->
<div id="page3" class="page hidden" style="flex-direction:column;align-items:center;gap:20px;">
  <div id="timer-image"></div>
  <div class="timer-number" id="timerDisplay">30</div>
</div>

<!-- Page 4: what color -->
<div id="page4" class="page hidden">
  <p class="color-q-text">what color(s) did you see?</p>
</div>

<!-- Page 5: color interaction -->
<div id="page5" class="page hidden" style="flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
  <div id="drag-hint" style="font-family:inherit;font-weight:300;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(40,35,55,0.5);margin-bottom:28px;opacity:0;">drag and drop</div>
  <div id="sections-row" style="display:flex;gap:12px;padding:0 20px;justify-content:center;align-items:flex-end;"></div>
  <div id="circles-row" style="display:flex;gap:16px;margin-top:36px;justify-content:center;flex-wrap:wrap;padding:0 20px;min-height:50px;"></div>
  <button id="done-btn" style="margin-top:36px;font-family:inherit;font-weight:300;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(40,35,55,0.6);background:none;border:none;border-bottom:1.5px solid rgba(40,35,55,0.3);padding:9px 24px;cursor:pointer;opacity:0;transition:color 0.2s,border-color 0.2s;">done</button>
</div>

<!-- Page result -->
<div id="page-result" class="page hidden" style="align-items:center;justify-content:center;">
  <canvas id="confetti-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;"></canvas>
  <canvas id="result-canvas" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 0.8s ease;z-index:11;pointer-events:none;"></canvas>
  <button id="restart-btn" style="position:absolute;bottom:140px;left:50%;transform:translateX(-50%);font-family:inherit;font-weight:300;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(40,35,55,0.6);background:none;border:none;border-bottom:1.5px solid rgba(40,35,55,0.3);padding:9px 24px;cursor:pointer;opacity:0;transition:color 0.2s,border-color 0.2s;z-index:12;white-space:nowrap;">restart</button>
</div>

<script>
// ── curtain ───────────────────────────────────────────────────────────────
const curtain = document.getElementById('curtain');
function transitionTo(fromId, toId, callback) {
  curtain.classList.add('fade-in');
  setTimeout(() => {
    document.getElementById(fromId).classList.add('hidden');
    const toEl = document.getElementById(toId);
    toEl.classList.remove('hidden');
    toEl.querySelectorAll('*').forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
    curtain.classList.remove('fade-in');
    if (callback) callback();
  }, 700);
}

// ── restart ───────────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('mouseenter', () => {
  document.getElementById('restart-btn').style.color = 'rgba(40,35,55,1)';
  document.getElementById('restart-btn').style.borderColor = 'rgba(40,35,55,0.7)';
});
document.getElementById('restart-btn').addEventListener('mouseleave', () => {
  document.getElementById('restart-btn').style.color = 'rgba(40,35,55,0.6)';
  document.getElementById('restart-btn').style.borderColor = 'rgba(40,35,55,0.3)';
});
document.getElementById('restart-btn').addEventListener('click', () => {
  soundClick();
  transitionTo('page-result', 'page1', () => {
    const cv = document.getElementById('captchaCanvas');
    // restore full-screen canvas styles that transitionTo wiped
    cv.style.position = 'absolute';
    cv.style.inset = '0';
    cv.style.width = '100%';
    cv.style.height = '100%';
    cv.style.zIndex = '0';
    cv.style.pointerEvents = 'none';
    cv.style.animation = 'none';
    cv.style.opacity = '0';
    drawCaptcha();
    // fade canvas in
    void cv.offsetWidth;
    cv.style.animation = 'fadeIn 1.2s ease 0.3s forwards';
    // show start button
    const sb = document.getElementById('start-btn');
    sb.style.animation = 'none';
    sb.style.opacity = '1';
  });
});

// ── audio ─────────────────────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq=520, dur=0.07, vol=0.15) {
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type='sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+dur);
}

function soundClick() {
  // soft high click — like a light tap
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(900, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.18, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.1);
}

function soundPickUp() {
  // airy rising tone — picking something up
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.14);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.14);
}

function soundDrop() {
  // soft thud — placing something down
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(320, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.18);
}

function soundMiss() {
  // quick low dip — dropped but missed a section
  ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.setValueAtTime(260, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.12);
  o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.12);
}

function soundConfetti() {
  ensureAudio();
  // bright sparkling chord — multiple quick high notes
  const notes = [880, 1100, 1320, 1540];
  notes.forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    const t = audioCtx.currentTime + i * 0.07;
    o.frequency.setValueAtTime(freq, t);
    o.frequency.exponentialRampToValueAtTime(freq * 1.05, t + 0.15);
    g.gain.setValueAtTime(0.13, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  });
}

// ── captcha ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('captchaCanvas');
const ctx = canvas.getContext('2d');
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b))}
function pick(arr){return arr[randInt(0,arr.length)]}

function drawCaptcha() {
  const W = window.innerWidth, H = window.innerHeight; canvas.width=W; canvas.height=H;
  canvas.style.width='100vw'; canvas.style.height='100vh'; canvas.style.position='absolute'; canvas.style.inset='0'; canvas.style.zIndex='0';
  ctx.clearRect(0,0,W,H);
  const cf=["Garamond,'EB Garamond',serif"];
  const sf=["Georgia,serif","Palatino,'Palatino Linotype',serif","Baskerville,'Baskerville Old Face',serif","'Times New Roman',Times,serif"];
  function ink(){return `hsl(${randInt(200,270)},${randInt(5,30)}%,${randInt(10,45)}%)`}
  const layout=[{text:"are you",y:H*0.5 - 60,bs:rand(54,66)},{text:"human?",y:H*0.5 + 60,bs:rand(66,82)}];
  layout.forEach(({text,y,bs:baseSize})=>{
    ctx.font=`bold ${baseSize}px Georgia,serif`;
    let tw=ctx.measureText(text).width*rand(0.95,1.08), cx=(W-tw)/2;
    for(const ch of text){
      const sz=baseSize+rand(-12,13),ang=rand(-0.32,0.32),dy=rand(-13,13),skX=rand(-0.08,0.08);
      const cf2=Math.random()<0.35?pick(cf):pick(sf),wt=Math.random()>0.25?'bold':'400',it=Math.random()<0.3?'italic':'';
      ctx.save(); ctx.font=`${it} ${wt} ${sz}px ${cf2}`;
      const cw=ctx.measureText(ch).width;
      ctx.translate(cx+cw/2,y+dy); ctx.rotate(ang); ctx.transform(1,0,skX,1,0,0);
      ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.fillStyle=ink();
      ctx.fillText(ch,-cw/2,0); ctx.restore(); cx+=cw+rand(-3,7);
    }
  });
  for(let i=0;i<28;i++){ctx.beginPath();ctx.moveTo(rand(-W*0.1,W*0.4),rand(-H*0.2,H*1.2));ctx.bezierCurveTo(rand(0,W*0.6),rand(-H*0.2,H*1.2),rand(W*0.4,W*1.1),rand(-H*0.2,H*1.2),rand(W*0.6,W*1.1),rand(-H*0.2,H*1.2));ctx.strokeStyle=`hsla(220,15%,30%,${rand(0.04,0.1)})`;ctx.lineWidth=rand(0.5,1.2);ctx.stroke();}
  for(let i=0;i<80;i++){ctx.beginPath();ctx.arc(rand(0,W),rand(0,H),rand(0.3,1.2),0,Math.PI*2);ctx.fillStyle=`hsla(220,10%,20%,${rand(0.04,0.12)})`;ctx.fill();}
}
drawCaptcha();

function drawResultText(phrase) {
  const rc = document.getElementById('result-canvas');
  const rctx = rc.getContext('2d');
  const W = window.innerWidth, H = window.innerHeight;
  const words = phrase.split(' ');
  const mid = Math.ceil(words.length / 2);
  const lines = [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
  rc.width = W; rc.height = H;
  rc.style.width = '100vw'; rc.style.height = '100vh';
  rc.style.position = 'absolute'; rc.style.inset = '0'; rc.style.zIndex = '0';
  rctx.clearRect(0, 0, W, H);
  const cf = ["Garamond,'EB Garamond',serif"];
  const sf = ["Georgia,serif","Palatino,'Palatino Linotype',serif","Baskerville,'Baskerville Old Face',serif","'Times New Roman',Times,serif"];
  function ink() { return `hsl(${randInt(200,270)},${randInt(5,30)}%,${randInt(10,45)}%)`; }
  const lineYs = [H*0.5 - 60, H*0.5 + 60];
  lines.forEach((text, li) => {
    const baseSize = rand(li===1 ? 52:40, li===1 ? 64:52);
    rctx.font = `bold ${baseSize}px Georgia,serif`;
    let totalW = rctx.measureText(text).width * rand(0.95,1.05);
    let cx = (W - totalW) / 2;
    for (const ch of text) {
      const size = baseSize+rand(-10,11), angle=rand(-0.3,0.3), dy=rand(-11,11), skewX=rand(-0.08,0.08);
      const charFont=Math.random()<0.35?pick(cf):pick(sf), wt=Math.random()>0.25?'bold':'400', it=Math.random()<0.3?'italic':'';
      rctx.save(); rctx.font=`${it} ${wt} ${size}px ${charFont}`;
      const cw=rctx.measureText(ch).width;
      rctx.translate(cx+cw/2, lineYs[li]+dy); rctx.rotate(angle); rctx.transform(1,0,skewX,1,0,0);
      rctx.shadowColor='transparent'; rctx.shadowBlur=0; rctx.fillStyle=ink();
      rctx.fillText(ch,-cw/2,0); rctx.restore(); cx+=cw+rand(-3,6);
    }
  });
  for(let i=0;i<28;i++){rctx.beginPath();rctx.moveTo(rand(-W*0.1,W*0.4),rand(-H*0.2,H*1.2));rctx.bezierCurveTo(rand(0,W*0.6),rand(-H*0.2,H*1.2),rand(W*0.4,W*1.1),rand(-H*0.2,H*1.2),rand(W*0.6,W*1.1),rand(-H*0.2,H*1.2));rctx.strokeStyle=`hsla(220,15%,30%,${rand(0.04,0.1)})`;rctx.lineWidth=rand(0.5,1.2);rctx.stroke();}
  for(let i=0;i<70;i++){rctx.beginPath();rctx.arc(rand(0,W),rand(0,H),rand(0.3,1.2),0,Math.PI*2);rctx.fillStyle=`hsla(220,10%,20%,${rand(0.03,0.1)})`;rctx.fill();}
}

// ── page flow ─────────────────────────────────────────────────────────────
const startBtn = document.getElementById('start-btn');
startBtn.addEventListener('mouseenter', () => { startBtn.style.color='rgba(40,35,55,1)'; startBtn.style.borderColor='rgba(40,35,55,0.7)'; });
startBtn.addEventListener('mouseleave', () => { startBtn.style.color='rgba(40,35,55,0.6)'; startBtn.style.borderColor='rgba(40,35,55,0.3)'; });
startBtn.addEventListener('click', () => {
  ensureAudio();
  soundClick();
  const sh = document.getElementById('sound-hint');
  sh.style.animation = 'none';
  sh.style.opacity = '0';
  transitionTo('page1','page2', () => {
    // stare for 3s then timer
    setTimeout(() => {
      transitionTo('page2','page3', () => { startTimer(); });
    }, 3000);
  });
});

// ── timer ─────────────────────────────────────────────────────────────────

// ── timer images (random) ────────────────────────────────────────────────

function startTimer() {
  const display = document.getElementById('timerDisplay');
  const img = document.getElementById('timer-image');
  display.style.opacity='1'; display.style.animation='none';
  const randImg = TIMER_IMAGES[Math.floor(Math.random() * TIMER_IMAGES.length)];
  img.style.backgroundImage = `url('${randImg}')`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>img.classList.add('visible')));
  let count=30; display.textContent=count;
  const iv=setInterval(()=>{
    count--; display.textContent=count;
    display.classList.remove('pulse'); void display.offsetWidth; display.classList.add('pulse');
    if(count<=0){
      beep(600, 0.6, 0.7);
      clearInterval(iv);
      setTimeout(()=>startBlink(display),200);
    } else {
      beep(480+(count/30)*120, 0.08, 0.15);
    }
  },1000);
}

function startBlink(display) {
  display.textContent='blink.'; display.style.animation='none'; display.style.opacity='1';
  let blinks=0;
  const iv=setInterval(()=>{
    blinks++; document.body.style.opacity=blinks%2===1?'0':'1';
    if(blinks>=12){
      clearInterval(iv); document.body.style.opacity='1';
      // page4: "what color do you see?" for 3 seconds then page5
      setTimeout(()=>transitionTo('page3','page4',()=>{
        setTimeout(()=>transitionTo('page4','page5', buildColorUI), 3000);
      }),600);
    }
  },200);
}

// ── color interaction ─────────────────────────────────────────────────────
const COLORS = [
  {id:'pink',   label:'pink',   bg:'#f4a7b9', dot:'#c4607a'},
  {id:'white',  label:'white',  bg:'#e0e0e0', dot:'#999'},
  {id:'yellow', label:'yellow', bg:'#f9e48a', dot:'#b8940a'},
  {id:'blue',   label:'blue',   bg:'#a8c8f0', dot:'#2a5aaa'},
  {id:'green',  label:'green',  bg:'#a8ddb5', dot:'#2a7a40'},
  {id:'orange', label:'orange', bg:'#f5b97e', dot:'#c05010'},
];

function buildColorUI() {
  const sectionsRow = document.getElementById('sections-row');
  const circlesRow  = document.getElementById('circles-row');
  const hint = document.getElementById('drag-hint');
  hint.style.animation = 'none';
  hint.style.opacity = '1';
  sectionsRow.innerHTML=''; circlesRow.innerHTML='';

  const CIRCLE_SIZE = 40;
  const sectionEls = {};
  // track which circles are in each section
  const sectionCircles = {}; // colorId -> count

  COLORS.forEach(c => {
    sectionCircles[c.id] = 0;
    const sec = document.createElement('div');
    sec.dataset.color = c.id;
    sec.style.cssText = `
      width: clamp(74px,11.5vw,106px);
      min-height: clamp(110px,19vh,155px);
      border-radius: 999px;
      background: ${c.bg};
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 8px 12px;
      gap: 6px;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    `;
    const lbl = document.createElement('span');
    lbl.style.cssText = `font-size:clamp(0.48rem,1vw,0.65rem);font-weight:200;letter-spacing:0.2em;text-transform:uppercase;color:${c.dot};flex-shrink:0;`;
    lbl.textContent = c.label;
    sec.appendChild(lbl);
    sectionsRow.appendChild(sec);
    sectionEls[c.id] = sec;
  });

  // create 6 circles in the staging area
  const circleData = [];
  for(let i=0;i<7;i++) {
    const c = document.createElement('div');
    c.style.cssText = `
      width:${CIRCLE_SIZE}px;height:${CIRCLE_SIZE}px;border-radius:50%;
      background:rgba(40,35,55,0.07);border:1.5px solid rgba(40,35,55,0.14);
      cursor:grab;touch-action:none;flex-shrink:0;
      transition:background 0.2s,border-color 0.2s;
    `;
    circleData.push({el:c, colorId:null, placed:false});
    circlesRow.appendChild(c);
  }

  let dragging = null, ghost = null;

  function getHoveredSection(x, y) {
    let best = null;
    Object.values(sectionEls).forEach(sec => {
      const r = sec.getBoundingClientRect();
      if (x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) best = sec;
    });
    return best;
  }

  function checkAllPlaced() {
    const btn = document.getElementById('done-btn');
    const allPlaced = circleData.every(d => d.placed);
    btn.style.opacity = allPlaced ? '1' : '0';
    btn.style.pointerEvents = allPlaced ? 'auto' : 'none';
  }

  const doneBtn = document.getElementById('done-btn');
  doneBtn.style.animation = 'none';
  doneBtn.onmouseenter = () => { doneBtn.style.color='rgba(40,35,55,1)'; doneBtn.style.borderColor='rgba(40,35,55,0.7)'; };
  doneBtn.onmouseleave = () => { doneBtn.style.color='rgba(40,35,55,0.6)'; doneBtn.style.borderColor='rgba(40,35,55,0.3)'; };
  doneBtn.onclick = () => {
    soundClick();
    const whiteCount = circleData.filter(d => d.colorId === 'white').length;
    const otherCount = circleData.filter(d => d.colorId !== 'white').length;
    const allWhite = whiteCount >= 2 && otherCount <= 2;
    const phrase = allWhite ? 'congrats, you are human.' : 'unfortunately, you are not human.';
    drawResultText(phrase);
    transitionTo('page5','page-result', () => {
      document.getElementById('result-canvas').style.opacity = '1';
      if (allWhite) { launchConfetti(); soundConfetti(); }
      setTimeout(() => {
        document.getElementById('restart-btn').style.opacity = '1';
      }, 600);
    });
  };

  circleData.forEach((cd, idx) => {
    const c = cd.el;

    c.addEventListener('pointerdown', e => {
      e.preventDefault();
      soundPickUp();
      // if already placed, pick it back out of the section
      if (cd.placed && cd.colorId) {
        const sec = sectionEls[cd.colorId];
        // move circle back to staging visually (just detach from section)
        c.style.background = 'rgba(40,35,55,0.07)';
        c.style.borderColor = 'rgba(40,35,55,0.14)';
        circlesRow.appendChild(c);
        sectionCircles[cd.colorId]--;
        cd.colorId = null;
        cd.placed = false;
        checkAllPlaced();
      }
      dragging = idx;
      c.setPointerCapture(e.pointerId);
      c.style.cursor = 'grabbing';
      c.style.opacity = '0.3';

      ghost = document.createElement('div');
      ghost.style.cssText = `
        width:${CIRCLE_SIZE}px;height:${CIRCLE_SIZE}px;border-radius:50%;
        background:rgba(40,35,55,0.2);border:1.5px solid rgba(40,35,55,0.4);
        position:fixed;pointer-events:none;z-index:9999;transform:scale(1.2);
      `;
      document.body.appendChild(ghost);
      ghost.style.left = (e.clientX - CIRCLE_SIZE/2) + 'px';
      ghost.style.top  = (e.clientY - CIRCLE_SIZE/2) + 'px';
      Object.values(sectionEls).forEach(s => s.style.transform = 'scale(1)');
    });

    c.addEventListener('pointermove', e => {
      if (dragging !== idx || !ghost) return;
      ghost.style.left = (e.clientX - CIRCLE_SIZE/2) + 'px';
      ghost.style.top  = (e.clientY - CIRCLE_SIZE/2) + 'px';
      const hov = getHoveredSection(e.clientX, e.clientY);
      Object.values(sectionEls).forEach(s => s.style.transform='scale(1)');
      if (hov) hov.style.transform = 'scale(1.05)';
    });

    c.addEventListener('pointerup', e => {
      if (dragging !== idx || !ghost) return;
      const hov = getHoveredSection(e.clientX, e.clientY);
      c.style.opacity = '1';
      if (hov) {
        soundDrop();
        const col = COLORS.find(x => x.id === hov.dataset.color);
        cd.colorId = col.id;
        cd.placed = true;
        sectionCircles[col.id]++;

        // style the circle to match the section
        c.style.background = col.dot + '55';
        c.style.borderColor = col.dot + '99';
        c.style.cursor = 'grab';

        // physically move circle into the section (above the label)
        const lbl = hov.querySelector('span');
        hov.insertBefore(c, lbl);

        checkAllPlaced();
      } else {
        soundMiss();
        // return to staging
        cd.colorId = null; cd.placed = false;
        c.style.background = 'rgba(40,35,55,0.07)';
        c.style.borderColor = 'rgba(40,35,55,0.14)';
        c.style.cursor = 'grab';
        circlesRow.appendChild(c);
      }
      Object.values(sectionEls).forEach(s => s.style.transform = 'scale(1)');
      ghost.remove(); ghost = null; dragging = null;
    });
  });
}

// ── confetti ──────────────────────────────────────────────────────────────
function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  const cx = cc.getContext('2d');
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;

  const COLORS = [
    '#f9c6d0', // pink
    '#fde9a2', // yellow
    '#b8d9f5', // blue
    '#b8e8c2', // green
    '#f5c9a0', // orange
    '#d5c8f0', // lavender
    '#c8e8f0', // light blue
    '#ffffff',
  ];

  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * cc.width,
    y: -20 - Math.random() * 300,
    w: 8 + Math.random() * 10,
    h: 4 + Math.random() * 5,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    vx: (Math.random() - 0.5) * 0.8,
    vy: 0.5 + Math.random() * 0.9,
    swayAmp: 0.3 + Math.random() * 0.5,
    swayFreq: 0.01 + Math.random() * 0.02,
    swayOffset: Math.random() * Math.PI * 2,
    opacity: 1,
  }));

  let frame;
  let elapsed = 0;

  function draw() {
    cx.clearRect(0, 0, cc.width, cc.height);
    elapsed++;
    let allGone = true;
    pieces.forEach(p => {
      p.x += p.vx + Math.sin(elapsed * p.swayFreq + p.swayOffset) * p.swayAmp;
      p.y += p.vy;
      p.vy += 0.006; // very gentle gravity
      p.rot += p.rotSpeed;
      if (elapsed > 200) p.opacity = Math.max(0, p.opacity - 0.006);
      if (p.y < cc.height + 20) allGone = false;

      cx.save();
      cx.globalAlpha = p.opacity;
      cx.translate(p.x, p.y);
      cx.rotate(p.rot);
      cx.fillStyle = p.color;
      cx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      cx.restore();
    });

    if (!allGone) {
      frame = requestAnimationFrame(draw);
    } else {
      cx.clearRect(0, 0, cc.width, cc.height);
    }
  }

  if (frame) cancelAnimationFrame(frame);
  draw();
}
